<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gia phả dòng họ</title>
  <style>
    :root { --bg:#0b1220; --card:#121b2e; --text:#e8eefc; --muted:#a8b3cf; --line:#2a3a66; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
    header { padding:16px 18px; border-bottom:1px solid #1c2a4a; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    header h1 { margin:0; font-size:18px; font-weight:700; }
    .btn { background:#1b2a52; color:var(--text); border:1px solid #2a3a66; padding:8px 10px; border-radius:10px; cursor:pointer; }
    .btn:hover { filter:brightness(1.1); }
    .hint { color:var(--muted); font-size:13px; }
    .wrap { height: calc(100vh - 64px); overflow:hidden; position:relative; }
    .viewport { position:absolute; inset:0; cursor:grab; }
    .viewport.grabbing { cursor:grabbing; }
    .tree { transform-origin: 0 0; padding:24px 24px 60px; }

    /* Tree layout */
    .genealogy { padding: 0; margin:0; }
    .genealogy ul { padding-top: 26px; position: relative; padding-left:0; margin:0; display:flex; justify-content:center; }
    .genealogy li { list-style: none; text-align: center; position: relative; padding: 26px 10px 0 10px; }

    .genealogy li::before, .genealogy li::after{
      content: '';
      position: absolute;
      top: 0;
      right: 50%;
      border-top: 2px solid var(--line);
      width: 50%;
      height: 26px;
    }
    .genealogy li::after{
      right: auto;
      left: 50%;
      border-left: 2px solid var(--line);
    }
    .genealogy li:only-child::after, .genealogy li:only-child::before { display:none; }
    .genealogy li:only-child{ padding-top:0; }
    .genealogy li:first-child::before { border:none; }
    .genealogy li:last-child::after { border:none; }
    .genealogy ul ul::before{
      content:'';
      position:absolute;
      top:0;
      left:50%;
      border-left:2px solid var(--line);
      width:0;
      height:26px;
    }

    /* Cards */
    .node { display:inline-block; background:var(--card); border:1px solid #24355f; border-radius:14px; padding:10px 12px; min-width:260px; box-shadow:0 10px 25px rgba(0,0,0,.25); }
    .rowTop { display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:8px; }
    .tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid #2a3a66; color:var(--muted); }

    .couple { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .personBox { border:1px solid #24355f; border-radius:12px; padding:8px 10px; background:rgba(255,255,255,0.02); text-align:left; min-width: 160px; }
    .personName { font-weight:800; font-size:14px; }
    .meta { margin-top:4px; color:var(--muted); font-size:12.5px; line-height:1.35; }
    .note { margin-top:6px; font-size:12.5px; color:#cfe1ff; opacity:.9; }

    .single { text-align:left; }
    .error { padding:16px; color:#ffd1d1; }
  </style>
</head>
<body>
<header>
  <h1>Gia phả dòng họ</h1>
  <button class="btn" id="zoomIn">+</button>
  <button class="btn" id="zoomOut">−</button>
  <button class="btn" id="reset">Reset</button>
  <span class="hint">Kéo để di chuyển • Ctrl + lăn chuột để zoom</span>
</header>

<div class="wrap">
  <div class="viewport" id="viewport">
    <div class="tree" id="tree">
      <div id="app" class="genealogy"></div>
      <div id="err" class="error" style="display:none"></div>
    </div>
  </div>
</div>

<script>
  const DATA_URL = './family.json';

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function ordinalChildLabel(i) {
    if (i === 0) return "Con trưởng";
    return `Con thứ ${i + 1}`;
  }

  function lifeLine(p) {
    const b = p?.born ? esc(p.born) : '';
    const d = p?.died ? esc(p.died) : '';
    if (!b && !d) return '';
    return `${b}${d ? ' - ' + d : ''}`;
  }

  function personBox(p, roleLabel) {
    if (!p) return `<div class="personBox"><div class="personName">(Chưa có)</div></div>`;
    const name = esc(p.name || '(Chưa có tên)');
    const life = lifeLine(p);
    const note = esc(p.note || '');
    return `
      <div class="personBox">
        <div class="personName">${name}${roleLabel ? ` <span class="tag">${roleLabel}</span>` : ''}</div>
        <div class="meta">
          ${life ? `<div><b>Năm:</b> ${life}</div>` : ''}
        </div>
        ${note ? `<div class="note">📝 ${note}</div>` : ''}
      </div>
    `;
  }

  function nodeCard(node, depth, childIndexOrNull) {
    const doi = `Đời ${depth}`;
    const childRank = (childIndexOrNull === null) ? '' : ordinalChildLabel(childIndexOrNull);

    const topTags = `
      <div class="rowTop">
        <span class="tag">${doi}</span>
        ${childRank ? `<span class="tag">${esc(childRank)}</span>` : ``}
      </div>
    `;

    if (node.couple) {
      const h = node.couple.husband || null;
      const w = node.couple.wife || null;
      return `
        <div class="node">
          ${topTags}
          <div class="couple">
            ${personBox(h, "Chồng")}
            ${personBox(w, "Vợ")}
          </div>
        </div>
      `;
    }

    const p = node.person || node; // fallback nếu bạn vẫn dùng schema cũ
    return `
      <div class="node single">
        ${topTags}
        ${personBox(p, "")}
      </div>
    `;
  }

  function renderChildren(node, depth) {
    const children = Array.isArray(node.children) ? node.children : [];
    if (!children.length) return '';
    return `<ul>${
      children.map((c, idx) => `<li>${nodeCard(c, depth + 1, idx)}${renderChildren(c, depth + 1)}</li>`).join('')
    }</ul>`;
  }

  async function boot() {
    const app = document.getElementById('app');
    const err = document.getElementById('err');
    try {
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Không load được ${DATA_URL}. HTTP ${res.status}`);
      const data = await res.json();

      app.innerHTML = `
        <ul>
          <li>
            ${nodeCard(data, 1, null)}
            ${renderChildren(data, 1)}
          </li>
        </ul>
      `;
    } catch (e) {
      err.style.display = 'block';
      err.innerHTML = `<div><b>Lỗi:</b> ${esc(e.message || e)}</div>`;
    }
  }

  // pan + zoom
  const viewport = document.getElementById('viewport');
  const tree = document.getElementById('tree');
  let scale = 1, x = 0, y = 0;
  let isDown = false, sx = 0, sy = 0;

  function applyTransform() { tree.style.transform = `translate(${x}px, ${y}px) scale(${scale})`; }

  viewport.addEventListener('mousedown', (e) => {
    isDown = true;
    viewport.classList.add('grabbing');
    sx = e.clientX - x;
    sy = e.clientY - y;
  });
  window.addEventListener('mouseup', () => {
    isDown = false;
    viewport.classList.remove('grabbing');
  });
  window.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    x = e.clientX - sx;
    y = e.clientY - sy;
    applyTransform();
  });

  viewport.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return;
    e.preventDefault();
    const delta = Math.sign(e.deltaY) * -0.1;
    scale = Math.min(2.5, Math.max(0.3, scale + delta));
    applyTransform();
  }, { passive:false });

  document.getElementById('zoomIn').onclick = () => { scale = Math.min(2.5, scale + 0.1); applyTransform(); };
  document.getElementById('zoomOut').onclick = () => { scale = Math.max(0.3, scale - 0.1); applyTransform(); };
  document.getElementById('reset').onclick = () => { scale = 1; x = 0; y = 0; applyTransform(); };

  boot();
</script>
</body>
</html>
