<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gia phả dòng họ</title>
  <style>
    :root { --bg:#0b1220; --card:#121b2e; --text:#e8eefc; --muted:#a8b3cf; --line:#2a3a66; --accent:#9cc3ff; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
    header { padding:12px 14px; border-bottom:1px solid #1c2a4a; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    header h1 { margin:0; font-size:16px; font-weight:800; }
    .btn { background:#1b2a52; color:var(--text); border:1px solid #2a3a66; padding:8px 10px; border-radius:10px; cursor:pointer; }
    .btn:hover { filter:brightness(1.1); }
    .btn.secondary { background:transparent; }
    .hint { color:var(--muted); font-size:12.5px; }
    .layout { display:grid; grid-template-columns: 1fr 360px; height: calc(100vh - 54px); }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } }

    .wrap { overflow:hidden; position:relative; border-right:1px solid #1c2a4a; }
    @media (max-width: 980px) { .wrap { border-right:none; border-bottom:1px solid #1c2a4a; } }

    .viewport { position:absolute; inset:0; cursor:grab; }
    .viewport.grabbing { cursor:grabbing; }
    .tree { transform-origin: 0 0; padding:24px 24px 60px; }
    .genealogy { padding: 0; margin:0; }
    .genealogy ul { padding-top: 26px; position: relative; padding-left:0; margin:0; display:flex; justify-content:center; }
    .genealogy li { list-style: none; text-align: center; position: relative; padding: 26px 10px 0 10px; }
    .genealogy li::before, .genealogy li::after{
      content: ''; position: absolute; top: 0; right: 50%;
      border-top: 2px solid var(--line); width: 50%; height: 26px;
    }
    .genealogy li::after{ right: auto; left: 50%; border-left: 2px solid var(--line); }
    .genealogy li:only-child::after, .genealogy li:only-child::before { display:none; }
    .genealogy li:only-child{ padding-top:0; }
    .genealogy li:first-child::before { border:none; }
    .genealogy li:last-child::after { border:none; }
    .genealogy ul ul::before{
      content:''; position:absolute; top:0; left:50%;
      border-left:2px solid var(--line); width:0; height:26px;
    }

    .node {
      display:inline-block; background:var(--card); border:1px solid #24355f; border-radius:14px;
      padding:10px 12px; min-width:260px; box-shadow:0 10px 25px rgba(0,0,0,.25);
    }
    .rowTop { display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:8px; }
    .tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid #2a3a66; color:var(--muted); }
    .tag.click { cursor:pointer; border-color:#35508c; color:#cfe1ff; }
    .tag.click:hover { filter:brightness(1.1); }

    .couple { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .personBox { border:1px solid #24355f; border-radius:12px; padding:8px 10px; background:rgba(255,255,255,0.02); text-align:left; min-width: 160px; }
    .personName { font-weight:800; font-size:14px; }
    .meta { margin-top:4px; color:var(--muted); font-size:12.5px; line-height:1.35; }
    .note { margin-top:6px; font-size:12.5px; color:#cfe1ff; opacity:.9; }
    .single { text-align:left; }

    /* Right panel */
    aside { padding:12px; overflow:auto; }
    .panel { background:rgba(255,255,255,0.03); border:1px solid #24355f; border-radius:14px; padding:12px; }
    .panel h2 { margin:0 0 10px; font-size:14px; }
    .grid { display:grid; gap:8px; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
    label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
    input, textarea, select {
      width:100%; box-sizing:border-box;
      background:#0f1830; border:1px solid #2a3a66; color:var(--text);
      padding:8px 10px; border-radius:10px; outline:none;
    }
    textarea { min-height:70px; resize:vertical; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .danger { border-color:#7c2b2b; background:#3a1515; }
    .danger:hover { filter:brightness(1.1); }
    .small { font-size:12px; color:var(--muted); margin-top:10px; line-height:1.4; }
    .error { padding:10px; border:1px solid #7c2b2b; background:#2a1010; border-radius:12px; color:#ffd1d1; display:none; margin-top:10px; }
    .ok { padding:10px; border:1px solid #2b7c3a; background:#102a16; border-radius:12px; color:#d6ffe0; display:none; margin-top:10px; }
  </style>
</head>
<body>
<header>
  <h1>Gia phả dòng họ</h1>
  <button class="btn" id="zoomIn">+</button>
  <button class="btn" id="zoomOut">−</button>
  <button class="btn" id="resetView">Reset view</button>

  <button class="btn secondary" id="useRepoJson">Load family.json</button>
  <button class="btn" id="saveLocal">Save (Local)</button>
  <button class="btn" id="exportJson">Export family.json</button>
  <label class="btn secondary" style="display:inline-flex;align-items:center;gap:8px">
    Import JSON
    <input type="file" id="importJson" accept="application/json" style="display:none">
  </label>

  <span class="hint">Click “Chọn” trên node để edit • GitHub Pages không lưu trực tiếp vào file</span>
</header>

<div class="layout">
  <div class="wrap">
    <div class="viewport" id="viewport">
      <div class="tree" id="tree">
        <div id="app" class="genealogy"></div>
      </div>
    </div>
  </div>

  <aside>
    <div class="panel">
      <h2>Editor</h2>

      <div class="grid">
        <div class="row">
          <div>
            <label>Node</label>
            <select id="nodeType">
              <option value="person">PERSON</option>
              <option value="couple">COUPLE</option>
            </select>
          </div>
          <div>
            <label>Đời / Thứ</label>
            <input id="nodeInfo" disabled />
          </div>
        </div>

        <div id="personFields">
          <div class="row">
            <div><label>Tên</label><input id="p_name"></div>
            <div><label>Năm sinh</label><input id="p_born"></div>
          </div>
          <div class="row">
            <div><label>Năm mất</label><input id="p_died"></div>
            <div><label>Ghi chú</label><input id="p_note"></div>
          </div>
        </div>

        <div id="coupleFields" style="display:none">
          <div class="row">
            <div><label>Chồng - Tên</label><input id="h_name"></div>
            <div><label>Chồng - Năm sinh</label><input id="h_born"></div>
          </div>
          <div class="row">
            <div><label>Chồng - Năm mất</label><input id="h_died"></div>
            <div><label>Chồng - Ghi chú</label><input id="h_note"></div>
          </div>

          <div class="row" style="margin-top:6px">
            <div><label>Vợ - Tên</label><input id="w_name"></div>
            <div><label>Vợ - Năm sinh</label><input id="w_born"></div>
          </div>
          <div class="row">
            <div><label>Vợ - Năm mất</label><input id="w_died"></div>
            <div><label>Vợ - Ghi chú</label><input id="w_note"></div>
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="apply">Apply</button>
          <button class="btn secondary" id="addChild">+ Add child</button>
          <button class="btn danger" id="deleteNode">Delete</button>
        </div>

        <div class="ok" id="okBox"></div>
        <div class="error" id="errBox"></div>

        <div class="small">
          <b>Save (Local)</b>: lưu vào trình duyệt (LocalStorage).<br>
          <b>Export family.json</b>: tải file JSON về máy rồi upload lại lên GitHub repo để cập nhật Pages.
        </div>
      </div>
    </div>
  </aside>
</div>

<script>
  const DATA_URL = './family.json';
  const LS_KEY = 'familyTreeDraft.v1';

  // ---------- state ----------
  let data = null;          // whole tree
  let selectedPath = [];    // array of indices to node from root (children indices)
  let selectedMeta = null;  // computed {depth, childIndex, label}
  let okTimer = null;

  // ---------- utils ----------
  const $ = (id) => document.getElementById(id);
  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function showOk(msg){ clearTimeout(okTimer); $('okBox').style.display='block'; $('okBox').textContent=msg; okTimer=setTimeout(()=>{$('okBox').style.display='none';}, 1600); }
  function showErr(msg){ $('errBox').style.display='block'; $('errBox').textContent=msg; }
  function clearErr(){ $('errBox').style.display='none'; $('errBox').textContent=''; }

  function getNodeByPath(root, path){
    let node = root;
    for (const idx of path){
      if (!node?.children || !node.children[idx]) return null;
      node = node.children[idx];
    }
    return node;
  }
  function getParentByPath(root, path){
    if (path.length === 0) return null;
    const parentPath = path.slice(0, -1);
    return getNodeByPath(root, parentPath);
  }

  function ordinalChildLabel(i){ return i === 0 ? 'Con trưởng' : `Con thứ ${i+1}`; }
  function lifeLine(p){
    const b = p?.born ? esc(p.born) : '';
    const d = p?.died ? esc(p.died) : '';
    if (!b && !d) return '';
    return `${b}${d ? ' - ' + d : ''}`;
  }

  // ---------- rendering ----------
  function personBox(p, roleLabel){
    if (!p) return `<div class="personBox"><div class="personName">(Chưa có)</div></div>`;
    const name = esc(p.name || '(Chưa có tên)');
    const life = lifeLine(p);
    const note = esc(p.note || '');
    return `
      <div class="personBox">
        <div class="personName">${name}${roleLabel ? ` <span class="tag">${roleLabel}</span>` : ''}</div>
        <div class="meta">${life ? `<div><b>Năm:</b> ${life}</div>` : ''}</div>
        ${note ? `<div class="note">📝 ${note}</div>` : ''}
      </div>
    `;
  }

  function nodeCard(node, depth, childIndexOrNull, path){
    const doi = `Đời ${depth}`;
    const childRank = (childIndexOrNull === null) ? '' : ordinalChildLabel(childIndexOrNull);
    const isSel = JSON.stringify(path) === JSON.stringify(selectedPath);

    const topTags = `
      <div class="rowTop">
        <span class="tag">${doi}</span>
        ${childRank ? `<span class="tag">${esc(childRank)}</span>` : ``}
        <span class="tag click" data-path="${esc(JSON.stringify(path))}">${isSel ? 'Đang chọn' : 'Chọn'}</span>
      </div>
    `;

    if (node?.couple){
      const h = node.couple.husband || null;
      const w = node.couple.wife || null;
      return `
        <div class="node">
          ${topTags}
          <div class="couple">
            ${personBox(h, "Chồng")}
            ${personBox(w, "Vợ")}
          </div>
        </div>
      `;
    }

    const p = node?.person || node;
    return `
      <div class="node single">
        ${topTags}
        ${personBox(p, "")}
      </div>
    `;
  }

  function renderChildren(node, depth, path){
    const children = Array.isArray(node?.children) ? node.children : [];
    if (!children.length) return '';
    return `<ul>${
      children.map((c, idx) => {
        const childPath = path.concat([idx]);
        return `<li>${nodeCard(c, depth+1, idx, childPath)}${renderChildren(c, depth+1, childPath)}</li>`;
      }).join('')
    }</ul>`;
  }

  function render(){
    const app = $('app');
    if (!data) { app.innerHTML = ''; return; }
    app.innerHTML = `
      <ul>
        <li>
          ${nodeCard(data, 1, null, [])}
          ${renderChildren(data, 1, [])}
        </li>
      </ul>
    `;

    // bind select buttons
    app.querySelectorAll('[data-path]').forEach(el => {
      el.addEventListener('click', () => {
        const p = JSON.parse(el.getAttribute('data-path'));
        selectNode(p);
      });
    });
  }

  // ---------- editor ----------
  function setEditorMode(type){
    $('nodeType').value = type;
    $('personFields').style.display = type === 'person' ? 'block' : 'none';
    $('coupleFields').style.display = type === 'couple' ? 'block' : 'none';
  }

  function fillEditor(node){
    if (!node) return;

    const type = node.couple ? 'couple' : 'person';
    setEditorMode(type);

    if (type === 'couple'){
      const h = node.couple?.husband || {};
      const w = node.couple?.wife || {};
      $('h_name').value = h.name || '';
      $('h_born').value = h.born || '';
      $('h_died').value = h.died || '';
      $('h_note').value = h.note || '';

      $('w_name').value = w.name || '';
      $('w_born').value = w.born || '';
      $('w_died').value = w.died || '';
      $('w_note').value = w.note || '';
    } else {
      const p = node.person || node;
      $('p_name').value = p.name || '';
      $('p_born').value = p.born || '';
      $('p_died').value = p.died || '';
      $('p_note').value = p.note || '';
    }

    // info label
    const depth = (selectedMeta?.depth ?? 1);
    const rank = (selectedMeta?.childIndex === null || selectedMeta?.childIndex === undefined)
      ? 'Root'
      : ordinalChildLabel(selectedMeta.childIndex);
    $('nodeInfo').value = `${'Đời ' + depth} • ${rank}`;
  }

  function computeMetaForPath(path){
    // depth = 1 + path length
    const depth = 1 + path.length;
    const childIndex = path.length === 0 ? null : path[path.length - 1];
    return { depth, childIndex };
  }

  function selectNode(path){
    selectedPath = path;
    selectedMeta = computeMetaForPath(path);
    const node = getNodeByPath(data, path);
    fillEditor(node);
    render();
    clearErr();
  }

  function applyEditor(){
    clearErr();
    const node = getNodeByPath(data, selectedPath);
    if (!node) return showErr('Không tìm thấy node đang chọn.');

    const type = $('nodeType').value;

    if (type === 'couple'){
      // convert node to couple if needed
      node.couple = node.couple || { husband:{}, wife:{} };
      delete node.person;

      node.couple.husband = {
        name: $('h_name').value.trim(),
        born: $('h_born').value.trim(),
        died: $('h_died').value.trim(),
        note: $('h_note').value.trim()
      };
      node.couple.wife = {
        name: $('w_name').value.trim(),
        born: $('w_born').value.trim(),
        died: $('w_died').value.trim(),
        note: $('w_note').value.trim()
      };

      if (!node.couple.husband.name && !node.couple.wife.name) {
        return showErr('COUPLE cần ít nhất 1 tên (chồng hoặc vợ).');
      }
    } else {
      const p = {
        name: $('p_name').value.trim(),
        born: $('p_born').value.trim(),
        died: $('p_died').value.trim(),
        note: $('p_note').value.trim()
      };
      if (!p.name) return showErr('PERSON cần Tên.');
      node.person = p;
      delete node.couple;
    }

    node.children = Array.isArray(node.children) ? node.children : [];
    render();
    showOk('Đã cập nhật node.');
  }

  function addChild(){
    clearErr();
    const parent = getNodeByPath(data, selectedPath);
    if (!parent) return showErr('Không tìm thấy node cha đang chọn.');

    parent.children = Array.isArray(parent.children) ? parent.children : [];
    // default new child is PERSON
    parent.children.push({ person: { name: 'Người mới', born: '', died: '', note: '' }, children: [] });

    // auto select new child
    const newPath = selectedPath.concat([parent.children.length - 1]);
    selectNode(newPath);
    render();
    showOk('Đã thêm con (node mới).');
  }

  function deleteNode(){
    clearErr();
    if (selectedPath.length === 0) {
      return showErr('Không thể xóa Root. (Bạn có thể sửa Root thành người/cặp khác.)');
    }
    const parent = getParentByPath(data, selectedPath);
    if (!parent?.children) return showErr('Không tìm thấy parent.');
    const idx = selectedPath[selectedPath.length - 1];

    parent.children.splice(idx, 1);

    // select parent after delete
    selectNode(selectedPath.slice(0, -1));
    render();
    showOk('Đã xóa node.');
  }

  // ---------- persistence ----------
  function saveLocal(){
    try{
      localStorage.setItem(LS_KEY, JSON.stringify(data, null, 2));
      showOk('Đã lưu LocalStorage.');
    }catch(e){
      showErr('Lưu LocalStorage thất bại: ' + (e?.message || e));
    }
  }

  function loadLocal(){
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function exportJson(){
    try{
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'family.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      showOk('Đã export family.json.');
    }catch(e){
      showErr('Export thất bại: ' + (e?.message || e));
    }
  }

  async function loadFromRepoJson(){
    clearErr();
    try{
      const res = await fetch(DATA_URL, { cache:'no-store' });
      if (!res.ok) throw new Error(`Không load được ${DATA_URL}. HTTP ${res.status}`);
      const j = await res.json();
      data = j;
      selectedPath = [];
      selectNode([]);
      render();
      showOk('Đã load family.json từ repo.');
    }catch(e){
      showErr('Load repo JSON thất bại: ' + (e?.message || e));
    }
  }

  // ---------- init ----------
  (function init(){
    // start with LocalStorage draft if exist, else load repo JSON
    const draft = loadLocal();
    if (draft){
      data = draft;
      selectedPath = [];
      selectNode([]);
      render();
      showOk('Đang dùng bản nháp từ LocalStorage.');
    } else {
      // fallback
      loadFromRepoJson();
    }
  })();

  // bind UI
  $('apply').onclick = applyEditor;
  $('addChild').onclick = addChild;
  $('deleteNode').onclick = deleteNode;

  $('saveLocal').onclick = saveLocal;
  $('exportJson').onclick = exportJson;
  $('useRepoJson').onclick = loadFromRepoJson;

  $('nodeType').addEventListener('change', () => {
    const t = $('nodeType').value;
    setEditorMode(t);
  });

  $('importJson').addEventListener('change', async (e) => {
    clearErr();
    const file = e.target.files?.[0];
    if (!file) return;
    try{
      const text = await file.text();
      const j = JSON.parse(text);
      data = j;
      selectedPath = [];
      selectNode([]);
      render();
      showOk('Đã import JSON.');
    }catch(err){
      showErr('Import thất bại: ' + (err?.message || err));
    } finally {
      e.target.value = '';
    }
  });

  // pan + zoom
  const viewport = $('viewport');
  const tree = $('tree');
  let scale = 1, x = 0, y = 0;
  let isDown = false, sx = 0, sy = 0;
  function applyTransform(){ tree.style.transform = `translate(${x}px, ${y}px) scale(${scale})`; }
  viewport.addEventListener('mousedown', (e) => { isDown=true; viewport.classList.add('grabbing'); sx=e.clientX-x; sy=e.clientY-y; });
  window.addEventListener('mouseup', ()=>{ isDown=false; viewport.classList.remove('grabbing'); });
  window.addEventListener('mousemove', (e)=>{ if(!isDown) return; x=e.clientX-sx; y=e.clientY-sy; applyTransform(); });
  viewport.addEventListener('wheel', (e)=>{ if(!e.ctrlKey) return; e.preventDefault(); scale=Math.min(2.5, Math.max(0.3, scale + Math.sign(e.deltaY)*-0.1)); applyTransform(); }, {passive:false});
  $('zoomIn').onclick=()=>{ scale=Math.min(2.5, scale+0.1); applyTransform(); };
  $('zoomOut').onclick=()=>{ scale=Math.max(0.3, scale-0.1); applyTransform(); };
  $('resetView').onclick=()=>{ scale=1; x=0; y=0; applyTransform(); };

</script>
</body>
</html>
